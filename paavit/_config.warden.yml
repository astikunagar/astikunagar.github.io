  - about.html
  - contact.html
  - products.html
  - product-detail.html
  - script.js
  - style.css
  - media
  - backup
  - socket
  - css
  - js
  - icons
  - images
  - paavit-backup-v1.zip
  - paavit/Paavit-Website.zip
  - Gemfile
  - Gemfile.lock
  - .warden
  - .cursor
  - .git
  - .gitignore
  - _config.warden.yml
  - vendor
  - "*.php"
  - "*.sql"
  - "*.xml"
  - "*.json"
  - .htaccess
  - robots.txt
  - sitemap.xml
  - googlefe599c4ecb379364.html
  - browserconfig.xml
  - manifest.json
  - email_signature.php
  - spath.php
  - sort.php
  - update_count.php
  - dbtest.sql
