# Local Warden overrides — see .env and .warden/warden-env.yml
#   hosts: 127.0.0.1 local.paavit.com
#   warden svc up && warden sign-certificate local.paavit.com && warden env up

paavit_url: https://local.paavit.com
destination: _site

exclude:
