<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Product Details | Paavit</title>
    <meta name="description" content="Discover detailed information, features, and benefits of Paavit premium home care and cleaning products.">
    <meta name="keywords" content="Paavit products, FMCG details, home care products, floor cleaner, handwash, detergent">
    
    <!-- Open Graph for SEO -->
    <meta property="og:title" content="Product Details | Paavit Premium Cleaning">
    <meta property="og:description" content="Explore the premium ingredients and superior performance of Paavit home care products.">
    <meta property="og:type" content="product">
    <meta property="og:url" content="{{ site.paavit_url }}/product-detail.html">
    <meta name="twitter:card" content="summary_large_image">
    
    {% include paavit/head-assets.html %}
</head>
<body>

    {% include paavit/header.html %}

    <section class="product-detail-section section-padding" style="margin-top: 80px; min-height: 80vh; display: flex; align-items: center;">
        <div class="container" id="product-detail-container">
            <a href="products.html" class="btn btn-outline reveal" style="margin-bottom: 2rem; padding: 0.5rem 1.5rem;"><i class="fas fa-arrow-left" style="margin-right: 8px;"></i> Back to Products</a>
            
            <div class="product-detail-wrapper reveal">
                <div class="pd-image-col">
                    <div class="pd-carousel">
                        <div class="pd-carousel-viewport" id="pd-carousel-viewport">
                            <!-- JS-injected 1L & 5L slides -->
                        </div>
                        <div class="pd-carousel-dots" role="tablist" aria-label="Product pack sizes">
                            <button class="pd-carousel-dot active" data-pack="1L" aria-label="1 Litre bottle" aria-selected="true"></button>
                            <button class="pd-carousel-dot" data-pack="5L" aria-label="5 Litre can" aria-selected="false"></button>
                        </div>
                    </div>
                </div>
                <div>
                    <span id="pd-category" class="hero-tag">Loading Category...</span>
                    <h1 id="pd-name" style="margin-bottom: 1rem;">Loading Product...</h1>
                    <h3 id="pd-shortDesc" style="color: var(--secondary); font-weight: 500;"></h3>

                    <div class="pd-pack-sizes">
                        <h4 class="pd-pack-heading"><i class="fas fa-box-open"></i> Available In</h4>
                        <div class="pd-pack-options">
                            <button type="button" class="pd-pack-option active" data-pack="1L" aria-selected="true">
                                <span class="pd-pack-icon"><i class="fas fa-wine-bottle"></i></span>
                                <span class="pd-pack-size">1 Litre</span>
                                <span class="pd-pack-desc">Retail bottle for everyday use</span>
                            </button>
                            <button type="button" class="pd-pack-option" data-pack="5L" aria-selected="false">
                                <span class="pd-pack-icon"><i class="fas fa-fill-drip"></i></span>
                                <span class="pd-pack-size">5 Litre</span>
                                <span class="pd-pack-desc">Bulk can for families & businesses</span>
                            </button>
                        </div>
                    </div>

                    <p id="pd-description" style="font-size: 1.1rem; margin-top: 1.5rem;"></p>
                    
                    <ul id="pd-features" class="product-features-list">
                        <!-- JS Injected Features -->
                    </ul>
                    
                    <a href="contact.html" class="btn btn-primary" style="margin-top: 1rem; gap: 10px;">Inquire for Bulk Order <i class="fas fa-paper-plane"></i></a>
                </div>
            </div>
        </div>
    </section>

    {% include paavit/footer-simple.html %}

    {% include paavit/scripts.html %}
</body>
</html>
